services:
  postgres:
    image: postgres:15-alpine
    container_name: booknook_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: booknook_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: booknook_api
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_HTTP_PORTS=8080
      - ConnectionStrings__DefaultConnection=Host=postgres;Database=booknook_db;Username=postgres;Password=password123
      - JwtSettings__Secret=SuperSecretKeyForJwtAuthenticationWhichMustBeAtLeast32BytesLong!
      - JwtSettings__Issuer=BookNookApi
      - JwtSettings__Audience=BookNookUsers
      - JwtSettings__ExpiryMinutes=1440
    depends_on:
      - postgres
    restart: unless-stopped

volumes:
  postgres_data:
